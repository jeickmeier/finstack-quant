metrics      = { python = "finstack.portfolio.metrics",      status = "missing", note = "Bindings are currently exported from finstack.portfolio root" }
optimization = { python = "finstack.portfolio",              status = "flattened", note = "Spec/result types (PortfolioOptimizationSpec, Constraint, Objective, MetricExpr, PerPositionMetric, PositionFilter, WeightingScheme, MissingMetricPolicy, Inequality, OptimizationStatus, TradeSpec, TradeDirection, TradeType, CandidatePosition, TradeUniverse, PortfolioOptimizationResult) plus optimize_portfolio_typed are exported flat on finstack.portfolio alongside the legacy JSON-string optimize_portfolio entry point" }

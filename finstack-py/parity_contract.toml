# ---------------------------------------------------------------------------
# finstack-analytics  →  finstack.analytics
# ---------------------------------------------------------------------------
[crates.analytics]
rust_crate = "finstack-analytics"
rust_lib   = "finstack/analytics/src/lib.rs"
python_package = "finstack.analytics"
visibility = "pub"
status = "exists"
# NOTE: the Python surface for finstack-analytics is intentionally flat — all
# functions and classes live directly under `finstack.analytics` regardless of
# their Rust submodule. Submodules below are recorded for traceability, with
# status="flattened" signalling the agreed single-pathway convention rather
# than a missing shim.

[crates.analytics.modules]
aggregation  = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance.period_stats; freestanding bindings removed in paredown" }
benchmark    = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance.beta / .greeks / .rolling_greeks; freestanding bindings removed" }
correlation  = { python = "finstack.valuations.correlation", status = "exists", note = "Rust-owned shared correlation infrastructure lives in finstack-analytics; Python/WASM keep the historical valuations.correlation namespace" }
drawdown     = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance.max_drawdown / .mean_drawdown / .drawdown_series / .drawdown_details" }
lookback     = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance.lookback_returns" }
performance  = { python = "finstack.analytics", status = "flattened", note = "Performance class is the sole entry point on finstack.analytics" }
returns      = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance constructors (prices) / Performance.from_returns" }
risk_metrics = { python = "finstack.analytics", status = "flattened", note = "Reachable via Performance scalar methods (CAGR/Sharpe/Sortino/VaR/etc.)" }


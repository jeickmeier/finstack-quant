# ---------------------------------------------------------------------------
# finstack-scenarios  →  finstack.scenarios
# ---------------------------------------------------------------------------
[crates.scenarios]
rust_crate = "finstack-scenarios"
rust_lib   = "finstack/scenarios/src/lib.rs"
python_package = "finstack.scenarios"
visibility = "pub"
status = "exists"

[crates.scenarios.modules]
# Scenario symbols are exposed flat on finstack.scenarios — the Rust crate's
# internal engine/spec/enums/reports partitioning is not surfaced as a
# separate Python import path to keep a single pathway.
#
# NOTE: ``finstack.scenarios`` now exposes a typed authoring path alongside the
# original JSON helpers — ``OperationSpec`` (typed classmethod constructors,
# one per Rust enum variant), ``RateBindingSpec``, and the supporting enums
# (``CurveKind``, ``VolSurfaceKind``, ``TenorMatchMode``, ``TimeRollMode``,
# ``Compounding``). Round-trip is delegated to serde on the Rust types so the
# wire contract (``tag = "kind"``, snake_case, with ``forward`` / ``par_cds``
# renames preserved) matches what the engine parses. These symbols remain flat
# on the package root rather than living under a ``spec`` submodule to keep a
# single pathway.
adapters  = { python = "finstack.scenarios.adapters",  status = "missing" }
templates = { python = "finstack.scenarios.templates", status = "missing" }
utils     = { python = "finstack.scenarios.utils",     status = "missing" }

# ---------------------------------------------------------------------------
# Explicit exclusions
#
# Items intentionally not mapped to Python.
# ---------------------------------------------------------------------------
[exclusions]
"finstack_core::golden"          = "Test-only module, feature-gated `golden`; not part of public API"
"finstack_core::validation"      = "Internal validation helpers; not exposed in Python bindings"
"finstack_statements::utils"     = "Internal utilities; not part of public Python surface"
"finstack_portfolio::scenarios"  = "Feature-gated `scenarios`; available through finstack.scenarios instead"
"finstack-valuations-macros"     = "Proc-macro crate; compile-time only, no Python surface"

# ---------------------------------------------------------------------------
# `.pyi` top-level parity
#
# The compiled extension stub at `finstack-py/finstack/finstack.pyi` must
# declare exactly these names at module level. Adding a name to the stub
# without listing it here (or vice versa) fails the parity test.
# ---------------------------------------------------------------------------
[pyi_top_level]
file = "finstack/finstack.pyi"
names = [
    "analytics",
    "attribution",
    "cashflows",
    "core",
    "covenants",
    "factor_model",
    "margin",
    "monte_carlo",
    "portfolio",
    "scenarios",
    "statements",
    "statements_analytics",
    "valuations",
]

# ---------------------------------------------------------------------------
# WASM top-level parity
#
# `finstack-wasm/index.js` must re-export exactly these namespaces from
# `./exports/*.js`. Adding or removing a namespace without updating this list
# fails the namespace_parity test in finstack-wasm/tests/.
# ---------------------------------------------------------------------------
[wasm_top_level]

error        = { python = "finstack.portfolio.error",        status = "missing" }
factor_model = { python = "finstack.portfolio",              status = "flattened", note = "Result types (RiskDecomposition, PositionRiskDecomposition, RiskBudgetResult, WhatIfResult, StressResult, StressAttribution, FactorAssignmentReport, CreditVolReport, VolHorizon, DecompositionConfig, ...) plus typed sibling functions (parametric/historical_var_decomposition_typed, evaluate_risk_budget_typed) are exported flat on finstack.portfolio; engine/builder types remain Rust-only for now" }

# Member-level pinning for the shared valuations.correlation classes.
#
# Export-name pins alone cannot detect method drift on classes exposed in
# both hosts, so every member shared by Python and WASM is pinned here as
# python_snake_case = "wasmCamelCase" (keys are "ClassName.python_member").
# Host-managed members (`free`, `__repr__`) are not listed.
#
# Intentional exclusions (Rust-only, by design):
# - Concrete copulas (`GaussianCopula`, `StudentTCopula`,
#   `RandomFactorLoadingCopula`, `MultiFactorCopula`) and concrete
#   recoveries (`ConstantRecovery`, `CorrelatedRecovery`): hosts construct
#   via the spec types only. The RFL-only `stress_correlation_proxy`
#   diagnostic is surfaced through `Copula.stress_correlation_proxy`
#   (throws for non-RFL models).
# - Simulation-oriented `Copula` trait methods
#   (`conditional_default_prob_with_sector`,
#   `conditional_default_prob_given_systematic_and_mixing`, `integrate_fn`,
#   `latent_variable`, `sample_mixing`): MC-engine internals, not part of

    "statements",
    "statements_analytics",
    "valuations",
]

# ---------------------------------------------------------------------------
# WASM top-level parity
#
# `finstack-quant-wasm/index.js` must re-export exactly these namespaces from
# `./exports/*.js`. Adding or removing a namespace without updating this list
# fails the namespace_parity test in finstack-quant-wasm/tests/.
# ---------------------------------------------------------------------------
[wasm_top_level]
file = "../finstack-quant-wasm/index.js"
namespaces = [
    "analytics",
    "attribution",
    "cashflows",
    "core",
    "covenants",
    "factor_model",
    "features",
    "margin",
    "monte_carlo",
    "portfolio",
    "scenarios",
    "statements",
    "statements_analytics",
    "valuations",
]

# ---------------------------------------------------------------------------
# WASM core subset
#
# The WASM `core` namespace intentionally exposes a strict subset of the
# Rust `finstack-quant-core` public surface — only the host-language-friendly
# primitives that browser callers actually need. Modules outside this list
# are deliberately not bound for WASM (e.g. `cashflow`, `config`, `credit`,
# `expr`, `explain`, `prelude`, `validation`). The standalone
# `finstack-quant-factor-model` crate is exposed through the separate top-level
# `factor_model` WASM namespace.
#
# Python tracks the full `finstack-quant-core` surface (see `[crates.core.modules]`
# above) because it is the canonical consumer; WASM is opt-in per module.
# This block documents the agreed subset so reviewers do not treat the WASM
# core surface as drifting from Python.
# ---------------------------------------------------------------------------
[wasm_core_subset]
rust_module_root = "finstack-quant-wasm/src/api/core/"
js_export_file   = "../finstack-quant-wasm/exports/core.js"
modules = [
    "currency",
    "dates",
    "market_data",
    "math",
    "money",
    "types",
]

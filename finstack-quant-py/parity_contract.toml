# Member-level pinning for the shared valuations.correlation classes.
#
# Export-name pins alone cannot detect method drift on classes exposed in
# both hosts, so every member shared by Python and WASM is pinned here as
# python_snake_case = "wasmCamelCase" (keys are "ClassName.python_member").
# Host-managed members (`free`, `__repr__`) are not listed.
#
# Intentional exclusions (Rust-only, by design):
# - Concrete copulas (`GaussianCopula`, `StudentTCopula`,
#   `RandomFactorLoadingCopula`, `MultiFactorCopula`) and concrete
#   recoveries (`ConstantRecovery`, `CorrelatedRecovery`): hosts construct
#   via the spec types only. The RFL-only `stress_correlation_proxy`
#   diagnostic is surfaced through `Copula.stress_correlation_proxy`
#   (throws for non-RFL models).
# - Simulation-oriented `Copula` trait methods
#   (`conditional_default_prob_with_sector`,
#   `conditional_default_prob_given_systematic_and_mixing`, `integrate_fn`,
#   `latent_variable`, `sample_mixing`): MC-engine internals, not part of
#   the host-facing surface.
[wasm_valuations_subset.correlation_members]
"CopulaSpec.gaussian" = "gaussian"
"CopulaSpec.student_t" = "studentT"
"CopulaSpec.random_factor_loading" = "randomFactorLoading"
"CopulaSpec.multi_factor" = "multiFactor"
"CopulaSpec.build" = "build"
"CopulaSpec.is_gaussian" = "isGaussian"
"CopulaSpec.is_student_t" = "isStudentT"
"CopulaSpec.is_rfl" = "isRfl"
"CopulaSpec.is_multi_factor" = "isMultiFactor"
"Copula.conditional_default_prob" = "conditionalDefaultProb"
"Copula.num_factors" = "numFactors"
"Copula.model_name" = "modelName"
"Copula.tail_dependence" = "tailDependence"
"Copula.stress_correlation_proxy" = "stressCorrelationProxy"
"RecoverySpec.constant" = "constant"
"RecoverySpec.market_correlated" = "marketCorrelated"
"RecoverySpec.market_standard_stochastic" = "marketStandardStochastic"
"RecoverySpec.expected_recovery" = "expectedRecovery"
"RecoverySpec.build" = "build"
"RecoveryModel.expected_recovery" = "expectedRecovery"
"RecoveryModel.conditional_recovery" = "conditionalRecovery"
"RecoveryModel.lgd" = "lgd"
"RecoveryModel.conditional_lgd" = "conditionalLgd"
"RecoveryModel.recovery_volatility" = "recoveryVolatility"
"RecoveryModel.is_stochastic" = "isStochastic"
"RecoveryModel.model_name" = "modelName"


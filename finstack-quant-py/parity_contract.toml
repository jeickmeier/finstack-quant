# Finstack Quant Python-Rust Structural Parity Contract
#
# This file is the authoritative source-of-truth for the canonical mapping
# between Rust crates/modules and Python packages/modules.
#
# Rules:
#   - Only `pub` items at the crate boundary are in scope. `pub(crate)` and
#     `pub(super)` are excluded.
#   - Each public Rust crate re-exported from finstack-quant/src/lib.rs maps to one
#     Python subpackage under `finstack_quant`.
#   - Audit scripts must read this file as the source-of-truth.
#   - No audit script may write to tracked repository files.

[meta]
version = "1.0.0"
description = "Canonical Rust→Python structural parity contract"
umbrella_crate = "finstack-quant"
umbrella_lib = "finstack-quant/src/lib.rs"

# ---------------------------------------------------------------------------
# finstack-quant-core  →  finstack_quant.core
# ---------------------------------------------------------------------------
[crates.core]
rust_crate = "finstack-quant-core"
rust_lib   = "finstack-quant/core/src/lib.rs"
python_package = "finstack_quant.core"
visibility = "pub"
status = "exists"  # Python package already present

[crates.core.modules]
cashflow      = { python = "finstack_quant.core.cashflow",      status = "missing", note = "Core cashflow APIs are not yet materialized as a dedicated Python submodule" }
config        = { python = "finstack_quant.core.config",        status = "exists" }
credit        = { python = "finstack_quant.core.credit",        status = "exists", note = "Includes scoring, pd, lgd, and migration submodules." }
currency      = { python = "finstack_quant.core.currency",      status = "exists" }
dates         = { python = "finstack_quant.core.dates",         status = "exists" }
error         = { python = "finstack_quant.core.error",         status = "missing" }
explain       = { python = "finstack_quant.core.explain",       status = "missing", note = "Explain helpers are not yet surfaced as a dedicated Python submodule" }
expr          = { python = "finstack_quant.core.expr",          status = "missing", note = "Expression APIs are not yet surfaced as a dedicated Python submodule" }
market_data   = { python = "finstack_quant.core.market_data",   status = "exists" }
math          = { python = "finstack_quant.core.math",          status = "exists" }
money         = { python = "finstack_quant.core.money",         status = "exists" }
prelude       = { python = "finstack_quant.core.prelude",       status = "missing" }
rating_scales = { python = "finstack_quant.core.rating_scales", status = "exists" }
types         = { python = "finstack_quant.core.types",         status = "exists" }
validation    = { python = "finstack_quant.core.validation",    status = "missing" }
# golden is feature-gated test-only — excluded (see [exclusions])

# Symbol-level pinning for finstack_quant.core.market_data — every name in
# `finstack_quant.core.market_data.__all__` must appear here.
[crates.core.market_data]
python_package = "finstack_quant.core.market_data"
public = [
    "curves",
    "fx",
    "context",
    "dtsm",
    "arbitrage",
    "BaseCorrelationCurve",
    "CreditIndexData",
    "DiscountCurve",
    "ForwardCurve",
    "FxDeltaVolSurface",
    "HazardCurve",
    "InflationCurve",
    "PriceCurve",
    "VolSurface",
    "VolCube",
    "VolatilityIndexCurve",
    "FxConversionPolicy",
    "FxRateResult",
    "FxMatrix",
    "MarketContext",
]

# ---------------------------------------------------------------------------
# finstack-quant-factor-model  →  finstack_quant.factor_model
# ---------------------------------------------------------------------------
[crates.factor_model]
rust_crate = "finstack-quant-factor-model"
rust_lib   = "finstack-quant/factor-model/src/lib.rs"
python_package = "finstack_quant.factor_model"
visibility = "pub"
status = "exists"
note = "Generic factor-model primitives are Rust-first today; credit hierarchy APIs are exposed under finstack_quant.factor_model.credit. Known asymmetry: WASM handles (finstack-quant-wasm/src/api/factor_model/mod.rs) are toJson-only, while Python exposes typed accessors on CreditFactorModel/LevelsAtDate/PeriodDecomposition; this is an accepted host-language divergence, not drift."

[crates.factor_model.modules]
primitives         = { python = "finstack_quant.factor_model.primitives", status = "missing", note = "FactorId/FactorType/FactorDefinition typed host-language constructors deferred; JSON contracts remain Rust-owned." }
matching           = { python = "finstack_quant.factor_model.matching", status = "missing", note = "MatchingConfig typed host-language constructors deferred; JSON contracts remain Rust-owned." }
credit             = { python = "finstack_quant.factor_model.credit", status = "exists", note = "CreditFactorModel, CreditCalibrator, LevelsAtDate, PeriodDecomposition, FactorCovarianceForecast, decompose_levels, decompose_period." }
config             = { python = "finstack_quant.factor_model.config", status = "missing", note = "FactorModelConfig is consumed as JSON via portfolio risk bindings; no typed host-language constructors." }
covariance         = { python = "finstack_quant.factor_model.covariance", status = "missing", note = "FactorCovarianceMatrix is JSON-only at the binding boundary (produced by FactorCovarianceForecast.covariance_at)." }
error              = { python = "finstack_quant.factor_model.error", status = "missing", note = "FactorModelError surfaces as Python exceptions via the centralized error mapping; not a host-language module." }
sensitivity_matrix = { python = "finstack_quant.factor_model.sensitivity_matrix", status = "missing", note = "Sensitivity-matrix assembly is Rust-internal to the portfolio risk pipeline." }

# ---------------------------------------------------------------------------
# finstack-quant-analytics  →  finstack_quant.analytics
# ---------------------------------------------------------------------------
[crates.analytics]
rust_crate = "finstack-quant-analytics"
rust_lib   = "finstack-quant/analytics/src/lib.rs"
python_package = "finstack_quant.analytics"
visibility = "pub"
status = "exists"
# NOTE: the Python surface for finstack-quant-analytics is intentionally flat — all
# functions and classes live directly under `finstack_quant.analytics` regardless of
# their Rust submodule. Submodules below are recorded for traceability, with
# status="flattened" signalling the agreed single-pathway convention rather
# than a missing shim.

[crates.analytics.modules]
aggregation  = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance.period_stats; freestanding bindings removed in paredown" }
benchmark    = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance.beta / .greeks / .rolling_greeks; freestanding bindings removed" }
correlation  = { python = "finstack_quant.valuations.correlation", status = "exists", note = "Rust-owned shared correlation infrastructure lives in finstack-quant-analytics; Python/WASM keep the historical valuations.correlation namespace" }
drawdown     = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance.max_drawdown / .mean_drawdown / .drawdown_series / .drawdown_details" }
lookback     = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance.lookback_returns" }
performance  = { python = "finstack_quant.analytics", status = "flattened", note = "Performance class is the sole entry point on finstack_quant.analytics" }
returns      = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance constructors (prices) / Performance.from_returns. Naming exception: Python Performance.from_returns takes a DataFrame; the Rust-shaped (dates, returns, ticker_names) constructor is Performance.from_returns_arrays" }
risk_metrics = { python = "finstack_quant.analytics", status = "flattened", note = "Reachable via Performance scalar methods (CAGR/Sharpe/Sortino/VaR/etc.)" }

[crates.analytics.symbols]
public = [
    "AnalyticsError",
    "BetaResult",
    "DatedSeries",
    "DrawdownEpisode",
    "GreeksResult",
    "LookbackReturns",
    "MultiFactorResult",
    "Performance",
    "PeriodStats",
    "RollingGreeks",
]

# ---------------------------------------------------------------------------
# finstack-quant-cashflows  →  finstack_quant.cashflows
# ---------------------------------------------------------------------------
[crates.cashflows]
rust_crate = "finstack-quant-cashflows"
rust_lib   = "finstack-quant/cashflows/src/lib.rs"
python_package = "finstack_quant.cashflows"
visibility = "pub"
status = "exists"
note = "First binding slice is JSON-only: schedule build/validate/flows/accrual and custom-cashflow bond JSON creation."

[crates.cashflows.modules]
json        = { python = "finstack_quant.cashflows",             status = "exists", note = "build_cashflow_schedule_json, build_cashflow_schedule_envelope_json, validate_cashflow_schedule_json, validate_cashflow_schedule_envelope_json, dated_flows_json, accrued_interest_json, bond_from_cashflows_json exposed flat on finstack_quant.cashflows" }
accrual     = { python = "finstack_quant.cashflows.accrual",     status = "missing", note = "Accrual engine reachable only via accrued_interest_json on the JSON bridge" }
aggregation = { python = "finstack_quant.cashflows.aggregation", status = "missing", note = "Period aggregation not yet bound; use the JSON bridge schedule output" }
builder     = { python = "finstack_quant.cashflows.builder",     status = "missing", note = "Builder/spec types travel as JSON via build_cashflow_schedule_json; no typed Python surface yet" }
primitives  = { python = "finstack_quant.cashflows.primitives",  status = "missing", note = "CashFlow/CFKind primitives travel as JSON; no typed Python surface yet" }
traits      = { python = "finstack_quant.cashflows.traits",      status = "missing", note = "Rust-side trait surface; not meaningful as a Python module" }

# Cross-crate symbols surfaced under finstack_quant.cashflows whose canonical Rust
# home is a different crate. Parity audits must resolve these against the
# listed crate, not finstack-quant-cashflows.
[crates.cashflows.cross_crate]
bond_from_cashflows_json = { rust_crate = "finstack-quant-valuations", rust_lib = "finstack-quant/valuations/src/lib.rs", note = "Canonical finstack_quant_valuations::bond_from_cashflows_json, exposed under finstack_quant.cashflows (Python) and cashflows.bondFromCashflowsJson (WASM) as a convenience bridge" }

# ---------------------------------------------------------------------------
# WASM cashflows facade subset + symbol-level triplet pinning.
# Python names are identical to the canonical Rust function names; the map
# below pins python_snake_case -> js camelCase for every root export.
# ---------------------------------------------------------------------------
[wasm_cashflows_subset]
rust_module_root = "../finstack-quant-wasm/src/api/cashflows/"
js_export_file   = "../finstack-quant-wasm/exports/cashflows.js"
root_exports = [
    "accruedInterestJson",
    "bondFromCashflowsJson",
    "buildCashflowScheduleEnvelopeJson",
    "buildCashflowScheduleJson",
    "datedFlowsJson",
    "validateCashflowScheduleEnvelopeJson",
    "validateCashflowScheduleJson",
]

[wasm_cashflows_subset.python_js_map]
accrued_interest_json = "accruedInterestJson"
bond_from_cashflows_json = "bondFromCashflowsJson"
build_cashflow_schedule_json = "buildCashflowScheduleJson"
build_cashflow_schedule_envelope_json = "buildCashflowScheduleEnvelopeJson"
dated_flows_json = "datedFlowsJson"
validate_cashflow_schedule_json = "validateCashflowScheduleJson"
validate_cashflow_schedule_envelope_json = "validateCashflowScheduleEnvelopeJson"


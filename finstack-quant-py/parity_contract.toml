"finstack_quant_statements::utils"     = "Internal utilities; not part of public Python surface"
"finstack_quant_portfolio::scenarios"  = "Feature-gated `scenarios`; available through finstack_quant.scenarios instead"
"finstack-quant-valuations-macros"     = "Proc-macro crate; compile-time only, no Python surface"

# ---------------------------------------------------------------------------
# `.pyi` top-level parity
#
# The compiled extension stub at `finstack-quant-py/finstack_quant/finstack_quant.pyi` must
# declare exactly these names at module level. Adding a name to the stub
# without listing it here (or vice versa) fails the parity test.
# ---------------------------------------------------------------------------
[pyi_top_level]
file = "finstack_quant/finstack_quant.pyi"
names = [
    "analytics",
    "attribution",
    "cashflows",
    "core",
    "covenants",
    "factor_model",
    "features",

# Scenario symbols are exposed flat on finstack_quant.scenarios — the Rust crate's
# internal engine/spec/enums/reports partitioning is not surfaced as a
# separate Python import path to keep a single pathway.
#
# NOTE: ``finstack_quant.scenarios`` now exposes a typed authoring path alongside the
# original JSON helpers — ``OperationSpec`` (typed classmethod constructors,
# one per Rust enum variant), ``RateBindingSpec``, and the supporting enums
# (``CurveKind``, ``VolSurfaceKind``, ``TenorMatchMode``, ``TimeRollMode``,
# ``Compounding``). Round-trip is delegated to serde on the Rust types so the
# wire contract (``tag = "kind"``, snake_case, with ``forward`` / ``par_cds``
# renames preserved) matches what the engine parses. These symbols remain flat
# on the package root rather than living under a ``spec`` submodule to keep a
# single pathway.
adapters  = { python = "finstack_quant.scenarios.adapters",  status = "missing" }
templates = { python = "finstack_quant.scenarios.templates", status = "missing" }
utils     = { python = "finstack_quant.scenarios.utils",     status = "missing" }

